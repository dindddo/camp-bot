<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ camp_name }}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: { 50: '#f8f9fa', 100: '#e9ecef', 200: '#dee2e6', 300: '#ced4da', 400: '#adb5bd', 500: '#6c757d', 600: '#495057', 700: '#343a40', 800: '#1a1a2e', 900: '#111122', 950: '#0a0a1a' },
                        accent: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
        .rank-row:hover { background: rgba(255,255,255,0.04); }
        .rank-row { transition: background 0.15s; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark-950 text-white min-h-screen">
    <!-- Nav -->
    <nav class="border-b border-white/5 sticky top-0 z-50 bg-dark-950/80 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-14">
                <a href="/" class="flex items-center gap-2.5 hover:opacity-80 transition-opacity">
                    <span class="text-xl">🚀</span>
                    <span class="font-bold text-white text-sm">{{ camp_name }}</span>
                </a>
                <div class="flex items-center gap-5">
                    <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors {% block nav_dashboard %}{% endblock %}">대시보드</a>
                    <a href="/course" class="text-sm text-gray-400 hover:text-white transition-colors {% block nav_course %}{% endblock %}">코스</a>
                    <a href="/announcements" class="text-sm text-gray-400 hover:text-white transition-colors {% block nav_announcements %}{% endblock %}">공지</a>
                    <div class="w-px h-4 bg-white/10"></div>
                    {% if user %}
                    <div class="flex items-center gap-2">
                        {% if user.picture %}
                        <img src="{{ user.picture }}" alt="" class="w-6 h-6 rounded-full">
                        {% endif %}
                        <span class="text-sm text-gray-300">{{ user.name }}</span>
                        <a href="/auth/logout" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">로그아웃</a>
                    </div>
                    {% else %}
                    <a href="/auth/login" class="text-sm text-gray-400 hover:text-white transition-colors flex items-center gap-1.5">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        시작하기
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 mt-16">
        <div class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-center gap-2 text-xs text-gray-600">
            <span>{{ camp_name }}</span>
            <span>&middot;</span>
            <span>Powered by Slack Bot + Claude AI</span>
        </div>
    </footer>
</body>
</html>
